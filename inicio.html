<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IbovPredict</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 2rem 1rem;
            animation: fadeIn 1s ease-out;
        }

        header h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            background: linear-gradient(45deg, #00ff88, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.8;
            font-weight: 400;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .hero {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2rem;
            margin: 2rem 0;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 500px;
            margin: 0 auto;
        }

        input, select {
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        select option {
            color: #ffffff !important;
            background-color: #1a1a2e !important;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn.green {
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            color: #0a0a0f;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }

        .btn.gold {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #0a0a0f;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.5);
            font-size: 1.2rem;
            padding: 1.1rem 2.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.6);
        }

        .btn.gold:hover {
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.7);
        }

        .highlights {
            margin: 4rem 0;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .highlights h2 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            opacity: 0.9;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out both;
        }

        .card:nth-child(1) { animation-delay: 0.5s; }
        .card:nth-child(2) { animation-delay: 0.6s; }
        .card:nth-child(3) { animation-delay: 0.7s; }
        .card:nth-child(4) { animation-delay: 0.8s; }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 255, 136, 0.2);
            border-color: rgba(0, 255, 136, 0.3);
        }

        .card h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #00ff88;
        }

        .card .price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        .card .variation {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .positive {
            color: #00ff88;
        }

        .negative {
            color: #ff4757;
        }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            opacity: 0.7;
            font-size: 0.9rem;
            margin-top: 4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1s ease-out 1s both;
        }

        /* ── Loading Overlay ── */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(0, 255, 136, 0.2);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 1.5rem;
            font-size: 1.3rem;
            color: #ffffff;
            text-align: center;
        }

        .loading-text small {
            display: block;
            margin-top: 0.5rem;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .hero {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .highlights h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>IbovPredict</h1>
        <p>Plataforma de Previsão de Ações • Ibovespa</p>
    </header>

    <main>
        <section class="hero">
            <form class="input-group" action="/analise" method="POST">
                <input type="text" name="ticker" id="stock" placeholder="Digite o código da ação (ex: PETR4, VALE3, ITUB4)" maxlength="10">
                <select name="periodo" id="period">
                    <option value="1">1 ano</option>
                    <option value="3">3 anos</option>
                    <option value="5">5 anos</option>
                    <option value="10">10 anos</option>
                    <option value="15">15 anos</option>
                    <option value="20">20 anos</option>
                </select>
                <div class="btn-group">
                    <button type="submit" class="btn green">📊 Análise Estatística</button>
                    <button type="submit" class="btn gold" formaction="/previsao">🔮 Previsão</button>
                </div>
            </form>
        </section>

        <section class="highlights">
            <h2>Ativos em Destaque</h2>
            <div class="cards-grid">
                <div class="card">
                    <h3>PETR4</h3>
                    <div class="price">R$ 35.20</div>
                    <div class="variation positive">+2.45%</div>
                </div>
                <div class="card">
                    <h3>VALE3</h3>
                    <div class="price">R$ 62.10</div>
                    <div class="variation negative">-0.87%</div>
                </div>
                <div class="card">
                    <h3>ITUB4</h3>
                    <div class="price">R$ 28.50</div>
                    <div class="variation positive">+1.23%</div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        Esta plataforma não constitui recomendação de investimento.
    </footer>

    <!-- ── Loading Overlay ── -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">
            Treinando modelo LSTM...
            <small>Isso pode levar alguns segundos ⏳</small>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const previsaoBtn = document.querySelector('.btn.gold');
            const overlay = document.getElementById('loadingOverlay');
            const loadingText = overlay.querySelector('.loading-text');

            previsaoBtn.addEventListener('click', function(e) {
                const ticker = document.querySelector('input[name="ticker"]').value || '...';
                loadingText.innerHTML = `
                    Treinando LSTM para <strong>${ticker.toUpperCase()}</strong>...
                    <small>200 épocas de treinamento • ~15 segundos ⏳</small>
                `;
                overlay.classList.add('active');
            });
        });
    </script>
</body>
</html>
