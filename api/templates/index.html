<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Predictor - LSTM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center py-10 transition-colors duration-300">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-2xl border border-gray-700">
        <h1 class="text-2xl font-bold mb-6 text-white text-center">Previsão de Ações</h1>
        
        <!-- Área de Mensagens -->
        <div id="statusArea" class="hidden mb-6 p-4 rounded-lg bg-blue-900/30 border border-blue-500/50 text-sm">
            <p id="statusMessage" class="text-blue-200 font-medium"></p>
        </div>

        <div class="flex gap-4 mb-8">
            <input type="text" id="ticker" placeholder="Ex: PETR4.SA" 
                   class="flex-1 p-2 bg-gray-700 border border-gray-600 rounded-md text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
            <button onclick="getPrediction()" id="btnPredict"
                    class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-500 transition-colors disabled:bg-gray-600">
                Prever
            </button>
        </div>

        <div id="loader" class="hidden text-center text-blue-400 font-semibold mb-4 animate-pulse">
            Processando requisição...
        </div>

        <div class="relative h-80 w-full bg-gray-900/50 rounded-lg p-2">
            <canvas id="predictionChart"></canvas>
        </div>
    </div>

    <script>
        let stockChart;
        const loader = document.getElementById('loader');
        const statusArea = document.getElementById('statusArea');
        const statusMessage = document.getElementById('statusMessage');

        function showStatus(msg) {
            statusArea.classList.remove('hidden');
            statusMessage.innerText = msg;
        }

        async function getPrediction() {
            const ticker = document.getElementById('ticker').value.toUpperCase();
            const btn = document.getElementById('btnPredict');

            if (!ticker) return alert("Digite um ticker.");

            btn.disabled = true;
            statusArea.classList.add('hidden');
            loader.innerText = "Consultando o modelo...";
            loader.classList.remove('hidden');

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker: ticker })
                });

                const data = await response.json();

                if (response.ok) {
                    renderChart(data.ticker, data.predictions);
                } else {
                    showStatus("Erro: " + (data.error || "Falha na requisição"));
                }
            } catch (error) {
                showStatus("Erro de conexão com a API.");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        function renderChart(ticker, predictions) {
            const ctx = document.getElementById('predictionChart').getContext('2d');
            
            // Gerar as datas começando de amanhã
            const labels = predictions.map((_, i) => {
                const date = new Date();
                date.setDate(date.getDate() + (i + 1));
                return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            });

            if (stockChart) stockChart.destroy();

            Chart.defaults.color = '#9ca3af';
            Chart.defaults.borderColor = '#374151';

            stockChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Previsão - ${ticker}`,
                        data: predictions,
                        borderColor: '#60a5fa',
                        backgroundColor: 'rgba(96, 165, 250, 0.2)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                title: (context) => `Data: ${context[0].label}`
                            }
                        }
                    },
                    scales: {
                        y: { 
                            grid: { color: '#374151' }, 
                            ticks: { callback: v => 'R$ ' + v.toFixed(2) } 
                        },
                        x: { 
                            grid: { display: false },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
